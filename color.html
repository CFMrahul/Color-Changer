<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Changer</title>
  <link rel="stylesheet" href="color.css">
</head>

<body>

  <main class="app">

    <section class="card">

      <header class="header">
        <h1>🎨 Color Changer</h1>
        <p>Click a color to change the background</p>
      </header>

      <div class="color-container">

        <button class="color-btn" id="orange"></button>

        <button class="color-btn" id="pink"></button>

        <button class="color-btn" id="black"></button>

        <button class="color-btn" id="green"></button>

      </div>

      <footer class="footer" id="ft">
        <p>Select any color above</p>
      </footer>

    </section>

  </main>

  <script src="color.js"></script>

</body>
</html>
